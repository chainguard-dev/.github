issuer: https://accounts.google.com
# The unique ID of the service account that staging-autofix runs as
subject: "118295070799166027529"

permissions:
  pull_requests: write
  # Required to push commits with fixes to the fork
  contents: write
  # Required to fix GitHub Actions workflow files
  workflows: write

# You can limit the scope of what autofix can access via this list
repositories:
  - enterprise-packages
  - os

issuer: https://accounts.google.com

# approver-bot@staging-enforce-cd1e.iam.gserviceaccount.com
subject: "104099575245879501824"

permissions:
  contents: write
  checks: read
  # mono PR head commits carry legacy commit statuses,
  # and reading a statusCheckRollup that contains StatusContext nodes requires
  # the commit-statuses permission; without it the whole rollup query fails with
  # "Resource not accessible by integration".
  statuses: read
  pull_requests: write

repositories:
- enterprise-packages
- extra-packages
- stereo
- mono

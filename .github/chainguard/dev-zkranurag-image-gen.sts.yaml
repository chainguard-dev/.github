# Octo STS policy for image-gen dev environment
# Service account: zkranurag-img@zkranurag-dev.iam.gserviceaccount.com

issuer: https://accounts.google.com
subject: "111184961842370500608"

permissions:
  # Read github actions logs
  actions: read

  # Read check status
  checks: read

  # Create and push branches with the generated image package
  contents: write

  # Create and update pull requests
  pull_requests: write

  # Read issue bodies (the bot's trigger), and comment on / label issues
  # to surface terminal failures (e.g. unpublished main APK) and apply the
  # skip:<identity> halt label.
  issues: write

  # Trigger and manage GitHub Actions workflows
  workflows: write

repositories:
  - stereo

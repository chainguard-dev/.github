# Octo STS policy for manifest-gen prod environment
# Service account: manifest-gen@prod-enforce-fabc.iam.gserviceaccount.com

issuer: https://accounts.google.com
subject: "113572236267592597229"

permissions:
  # Read github actions logs
  actions: read

  # Read check status
  checks: read

  # Create and push branches
  contents: write

  # Create and update pull requests
  pull_requests: write

  # Comment on and label issues
  issues: write

  # Trigger and manage GitHub Actions workflows
  workflows: write

repositories:
  - stereo
